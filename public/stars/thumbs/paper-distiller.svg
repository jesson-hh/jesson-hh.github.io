<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="amber" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e8c688" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#e8c688" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <ellipse cx="160" cy="110" rx="160" ry="100" fill="url(#amber)"/>
  <!-- three offset paper sheets, deepest first -->
  <g>
    <!-- back sheet -->
    <rect x="110" y="78" width="120" height="92" rx="3"
          fill="rgba(20,30,60,.6)" stroke="rgba(230,201,132,.18)" stroke-width=".6"/>
    <!-- middle sheet -->
    <rect x="100" y="68" width="120" height="92" rx="3"
          fill="rgba(28,40,80,.65)" stroke="rgba(230,201,132,.28)" stroke-width=".6"/>
    <!-- front sheet (active) -->
    <rect x="90" y="58" width="120" height="92" rx="3"
          fill="rgba(40,52,98,.55)" stroke="rgba(230,201,132,.55)" stroke-width=".8"/>
    <!-- text lines in front sheet -->
    <g stroke="rgba(216,200,170,.55)" stroke-width=".8" stroke-linecap="round">
      <line x1="98" y1="70" x2="160" y2="70"/>
      <line x1="98" y1="80" x2="200" y2="80"/>
      <line x1="98" y1="90" x2="190" y2="90"/>
      <line x1="98" y1="100" x2="175" y2="100"/>
      <line x1="98" y1="110" x2="200" y2="110"/>
      <line x1="98" y1="120" x2="160" y2="120"/>
      <line x1="98" y1="130" x2="195" y2="130"/>
      <line x1="98" y1="140" x2="170" y2="140"/>
    </g>
    <!-- gold spine -->
    <rect x="86" y="58" width="3" height="92" fill="#e8c688"/>
    <!-- distillation droplet -->
    <circle cx="235" cy="115" r="3.2" fill="#e8c688"/>
    <circle cx="235" cy="115" r="7" fill="none" stroke="rgba(230,201,132,.55)" stroke-width=".6"/>
    <path d="M 215 115 L 224 115" stroke="rgba(230,201,132,.7)" stroke-width=".8"/>
    <!-- drip below -->
    <circle cx="248" cy="135" r="1.4" fill="#e8c688" opacity=".75"/>
    <circle cx="256" cy="148" r=".9" fill="#e8c688" opacity=".5"/>
  </g>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="30" cy="35" r=".7" opacity=".8"/>
    <circle cx="280" cy="40" r=".5" opacity=".6"/>
    <circle cx="50" cy="180" r=".4" opacity=".5"/>
    <circle cx="290" cy="190" r=".6" opacity=".7"/>
    <circle cx="20" cy="105" r=".4" opacity=".5"/>
    <circle cx="60" cy="200" r=".5" opacity=".6"/>
    <circle cx="270" cy="65" r=".4" opacity=".5"/>
  </g>
</svg>
