<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="rise" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#e8c688" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#e8c688" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <ellipse cx="180" cy="220" rx="200" ry="120" fill="url(#rise)"/>
  <!-- subtle horizontal grid -->
  <g stroke="rgba(230,201,132,.08)" stroke-width=".5">
    <line x1="20" y1="60" x2="300" y2="60"/>
    <line x1="20" y1="110" x2="300" y2="110"/>
    <line x1="20" y1="160" x2="300" y2="160"/>
  </g>
  <!-- candlesticks: a mix of up (gold) and down (cool blue), one tall gold standout -->
  <g stroke-linecap="round">
    <!-- wicks first, then bodies -->
    <line x1="50" y1="130" x2="50" y2="170" stroke="rgba(180,205,255,.45)" stroke-width="1"/>
    <line x1="80" y1="115" x2="80" y2="160" stroke="rgba(230,201,132,.7)" stroke-width="1"/>
    <line x1="110" y1="90" x2="110" y2="155" stroke="rgba(180,205,255,.5)" stroke-width="1"/>
    <line x1="140" y1="55" x2="140" y2="135" stroke="rgba(230,201,132,1)" stroke-width="1.2"/>
    <line x1="170" y1="80" x2="170" y2="145" stroke="rgba(230,201,132,.7)" stroke-width="1"/>
    <line x1="200" y1="100" x2="200" y2="150" stroke="rgba(180,205,255,.5)" stroke-width="1"/>
    <line x1="230" y1="70" x2="230" y2="140" stroke="rgba(230,201,132,.85)" stroke-width="1.1"/>
    <line x1="260" y1="105" x2="260" y2="160" stroke="rgba(180,205,255,.4)" stroke-width="1"/>
  </g>
  <g stroke-linecap="butt">
    <rect x="46" y="148" width="8" height="14" fill="rgba(180,205,255,.7)"/>
    <rect x="76" y="125" width="8" height="22" fill="rgba(230,201,132,.85)"/>
    <rect x="106" y="100" width="8" height="40" fill="rgba(180,205,255,.65)"/>
    <!-- tallest gold candle: standout signal -->
    <rect x="136" y="65" width="8" height="58" fill="#e8c688"/>
    <rect x="136" y="65" width="8" height="58" fill="none" stroke="rgba(255,236,200,.65)" stroke-width=".6"/>
    <rect x="166" y="88" width="8" height="42" fill="rgba(230,201,132,.85)"/>
    <rect x="196" y="115" width="8" height="28" fill="rgba(180,205,255,.7)"/>
    <rect x="226" y="80" width="8" height="50" fill="rgba(230,201,132,.92)"/>
    <rect x="256" y="115" width="8" height="32" fill="rgba(180,205,255,.5)"/>
  </g>
  <!-- baseline -->
  <line x1="20" y1="180" x2="300" y2="180" stroke="rgba(230,201,132,.3)" stroke-width=".6"/>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="30" cy="30" r=".6" opacity=".7"/>
    <circle cx="90" cy="20" r=".4" opacity=".5"/>
    <circle cx="280" cy="35" r=".7" opacity=".8"/>
    <circle cx="220" cy="22" r=".4" opacity=".5"/>
    <circle cx="20" cy="200" r=".5" opacity=".6"/>
    <circle cx="300" cy="205" r=".4" opacity=".5"/>
  </g>
</svg>
