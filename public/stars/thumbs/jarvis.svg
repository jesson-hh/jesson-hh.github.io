<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9cb4ff" stop-opacity=".7"/>
      <stop offset="50%" stop-color="#5670c0" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#3a64c7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- arc-reactor-style iris -->
  <g transform="translate(160 110)">
    <circle r="46" fill="url(#core)"/>
    <!-- outer thin ring -->
    <circle r="44" fill="none" stroke="rgba(216,180,106,.35)" stroke-width=".6"/>
    <!-- mid ring with notches -->
    <circle r="34" fill="none" stroke="rgba(216,180,106,.5)" stroke-width=".9" stroke-dasharray="3 4"/>
    <!-- inner ring -->
    <circle r="22" fill="none" stroke="rgba(255,236,200,.6)" stroke-width=".8"/>
    <!-- iris segments (8) -->
    <g stroke="rgba(216,180,106,.5)" stroke-width="1" stroke-linecap="round" fill="none">
      <line x1="0" y1="-30" x2="0" y2="-14"/>
      <line x1="21.2" y1="-21.2" x2="9.9" y2="-9.9"/>
      <line x1="30" y1="0" x2="14" y2="0"/>
      <line x1="21.2" y1="21.2" x2="9.9" y2="9.9"/>
      <line x1="0" y1="30" x2="0" y2="14"/>
      <line x1="-21.2" y1="21.2" x2="-9.9" y2="9.9"/>
      <line x1="-30" y1="0" x2="-14" y2="0"/>
      <line x1="-21.2" y1="-21.2" x2="-9.9" y2="-9.9"/>
    </g>
    <!-- center bright dot -->
    <circle r="4" fill="#fff"/>
    <circle r="2" fill="#e8c688"/>
    <!-- subtle outer flare lines -->
    <g stroke="rgba(156,180,255,.18)" stroke-width=".5" fill="none">
      <line x1="0" y1="-90" x2="0" y2="-58"/>
      <line x1="0" y1="58" x2="0" y2="90"/>
      <line x1="-110" y1="0" x2="-58" y2="0"/>
      <line x1="58" y1="0" x2="110" y2="0"/>
    </g>
  </g>
  <!-- ambient horizontal frequency line -->
  <line x1="20" y1="180" x2="300" y2="180" stroke="rgba(156,180,255,.18)" stroke-width=".4"/>
  <line x1="20" y1="186" x2="300" y2="186" stroke="rgba(156,180,255,.12)" stroke-width=".4"/>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="30" cy="28" r=".7" opacity=".8"/>
    <circle cx="290" cy="32" r=".5" opacity=".6"/>
    <circle cx="55" cy="60" r=".4" opacity=".5"/>
    <circle cx="270" cy="65" r=".4" opacity=".5"/>
    <circle cx="40" cy="200" r=".5" opacity=".6"/>
    <circle cx="280" cy="200" r=".6" opacity=".75"/>
  </g>
</svg>
