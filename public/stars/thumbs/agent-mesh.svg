<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="net" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c97bb7" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#c97bb7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <ellipse cx="160" cy="110" rx="180" ry="120" fill="url(#net)"/>
  <!-- mesh edges -->
  <g stroke-width=".7" fill="none">
    <line x1="60" y1="55" x2="160" y2="60" stroke="rgba(230,201,132,.55)"/>
    <line x1="160" y1="60" x2="260" y2="50" stroke="rgba(230,201,132,.45)"/>
    <line x1="60" y1="55" x2="100" y2="125" stroke="rgba(156,180,255,.4)"/>
    <line x1="160" y1="60" x2="100" y2="125" stroke="rgba(230,201,132,.55)"/>
    <line x1="160" y1="60" x2="200" y2="125" stroke="rgba(230,201,132,.6)"/>
    <line x1="260" y1="50" x2="200" y2="125" stroke="rgba(156,180,255,.4)"/>
    <line x1="260" y1="50" x2="270" y2="135" stroke="rgba(216,180,106,.3)" stroke-dasharray="2 3"/>
    <line x1="100" y1="125" x2="200" y2="125" stroke="rgba(230,201,132,.7)"/>
    <line x1="100" y1="125" x2="70" y2="180" stroke="rgba(156,180,255,.45)"/>
    <line x1="200" y1="125" x2="170" y2="185" stroke="rgba(230,201,132,.5)"/>
    <line x1="200" y1="125" x2="250" y2="180" stroke="rgba(156,180,255,.4)"/>
    <line x1="70" y1="180" x2="170" y2="185" stroke="rgba(216,180,106,.3)" stroke-dasharray="2 3"/>
    <line x1="170" y1="185" x2="250" y2="180" stroke="rgba(216,180,106,.3)" stroke-dasharray="2 3"/>
    <!-- pending edge — preflight -->
    <line x1="270" y1="135" x2="250" y2="180" stroke="rgba(156,180,255,.25)" stroke-dasharray="1 4"/>
  </g>
  <!-- nodes — gold = agent hosts active, blue = workers, dim = preflight -->
  <g>
    <!-- top row -->
    <circle cx="60" cy="55" r="2.6" fill="#e8c688"/>
    <circle cx="60" cy="55" r="6" fill="none" stroke="rgba(230,201,132,.45)" stroke-width=".6"/>
    <circle cx="160" cy="60" r="3" fill="#e8c688"/>
    <circle cx="160" cy="60" r="7.5" fill="none" stroke="rgba(230,201,132,.5)" stroke-width=".6"/>
    <circle cx="260" cy="50" r="2.4" fill="#e8c688"/>
    <!-- middle row -->
    <circle cx="100" cy="125" r="2.2" fill="#9cb4ff"/>
    <circle cx="200" cy="125" r="2.6" fill="#e8c688"/>
    <circle cx="200" cy="125" r="6" fill="none" stroke="rgba(230,201,132,.45)" stroke-width=".6"/>
    <!-- right pending node — dashed ring -->
    <circle cx="270" cy="135" r="2.2" fill="none" stroke="rgba(216,180,106,.6)" stroke-width=".8" stroke-dasharray="2 2"/>
    <!-- bottom row -->
    <circle cx="70" cy="180" r="2" fill="#9cb4ff"/>
    <circle cx="170" cy="185" r="2.2" fill="#9cb4ff"/>
    <circle cx="250" cy="180" r="2" fill="#9cb4ff"/>
  </g>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="22" cy="30" r=".5" opacity=".6"/>
    <circle cx="120" cy="22" r=".4" opacity=".5"/>
    <circle cx="220" cy="22" r=".5" opacity=".6"/>
    <circle cx="295" cy="35" r=".4" opacity=".5"/>
    <circle cx="22" cy="105" r=".4" opacity=".4"/>
    <circle cx="305" cy="100" r=".5" opacity=".6"/>
    <circle cx="35" cy="200" r=".4" opacity=".5"/>
    <circle cx="135" cy="208" r=".5" opacity=".55"/>
    <circle cx="300" cy="210" r=".4" opacity=".5"/>
  </g>
</svg>
