<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="78%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="haze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b4cc5" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#7b4cc5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <ellipse cx="160" cy="110" rx="180" ry="120" fill="url(#haze)"/>
  <!-- scout sweep arc — a "found" zone -->
  <path d="M 80 110 A 70 70 0 0 1 220 90" fill="none" stroke="rgba(230,201,132,.3)" stroke-width=".6" stroke-dasharray="2 3"/>
  <!-- constellation links among "scored" nodes -->
  <g stroke="rgba(230,201,132,.55)" stroke-width=".55" fill="none">
    <line x1="100" y1="98" x2="148" y2="80"/>
    <line x1="148" y1="80" x2="200" y2="100"/>
    <line x1="148" y1="80" x2="170" y2="140"/>
    <line x1="200" y1="100" x2="226" y2="156"/>
    <line x1="170" y1="140" x2="226" y2="156"/>
  </g>
  <!-- nodes (gold = selected, white = scanned, dim = noise) -->
  <g>
    <circle cx="100" cy="98" r="2.2" fill="#e8c688"/>
    <circle cx="148" cy="80" r="3" fill="#e8c688"/>
    <circle cx="148" cy="80" r="7" fill="none" stroke="rgba(230,201,132,.5)" stroke-width=".7"/>
    <circle cx="200" cy="100" r="2" fill="#e8c688"/>
    <circle cx="170" cy="140" r="1.8" fill="#9cb4ff"/>
    <circle cx="226" cy="156" r="2" fill="#9cb4ff"/>
    <!-- dimmer scanned nodes -->
    <circle cx="60" cy="60" r="1.4" fill="#fff" opacity=".4"/>
    <circle cx="60" cy="170" r="1.2" fill="#fff" opacity=".4"/>
    <circle cx="260" cy="60" r="1.4" fill="#fff" opacity=".4"/>
    <circle cx="270" cy="180" r="1.2" fill="#fff" opacity=".4"/>
    <circle cx="40" cy="120" r="1" fill="#fff" opacity=".3"/>
    <circle cx="285" cy="115" r="1" fill="#fff" opacity=".3"/>
  </g>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="30" cy="40" r=".5" opacity=".6"/>
    <circle cx="120" cy="30" r=".4" opacity=".5"/>
    <circle cx="220" cy="40" r=".7" opacity=".8"/>
    <circle cx="290" cy="40" r=".4" opacity=".5"/>
    <circle cx="25" cy="200" r=".6" opacity=".7"/>
    <circle cx="130" cy="190" r=".5" opacity=".55"/>
    <circle cx="210" cy="200" r=".4" opacity=".4"/>
    <circle cx="305" cy="195" r=".5" opacity=".6"/>
    <circle cx="190" cy="180" r=".4" opacity=".4"/>
  </g>
</svg>
