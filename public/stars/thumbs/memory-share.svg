<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c0e2e"/>
      <stop offset="60%" stop-color="#05071a"/>
      <stop offset="100%" stop-color="#02030d"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c688" stop-opacity=".7"/>
      <stop offset="60%" stop-color="#e8c688" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#e8c688" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- core glow -->
  <circle cx="160" cy="110" r="38" fill="url(#core)"/>
  <!-- nested orbits — shared memory layers -->
  <g fill="none" stroke-linecap="round">
    <ellipse cx="160" cy="110" rx="80" ry="22" stroke="rgba(216,180,106,.45)" stroke-width=".8" transform="rotate(-18 160 110)"/>
    <ellipse cx="160" cy="110" rx="110" ry="32" stroke="rgba(216,180,106,.32)" stroke-width=".7" transform="rotate(-18 160 110)"/>
    <ellipse cx="160" cy="110" rx="140" ry="46" stroke="rgba(216,180,106,.22)" stroke-width=".6" transform="rotate(-18 160 110)"/>
    <!-- vertical companion orbit -->
    <ellipse cx="160" cy="110" rx="22" ry="78" stroke="rgba(156,180,255,.32)" stroke-width=".7" transform="rotate(-18 160 110)"/>
  </g>
  <!-- central core -->
  <circle cx="160" cy="110" r="3" fill="#e8c688"/>
  <circle cx="160" cy="110" r="6" fill="none" stroke="rgba(255,236,200,.7)" stroke-width=".6"/>
  <!-- particles on the orbits (agents sharing memory) -->
  <g>
    <circle cx="78" cy="118" r="2" fill="#9cb4ff"/>
    <circle cx="244" cy="100" r="2" fill="#9cb4ff"/>
    <circle cx="118" cy="44" r="1.7" fill="#fff" opacity=".85"/>
    <circle cx="208" cy="176" r="1.7" fill="#fff" opacity=".85"/>
    <circle cx="50" cy="138" r="1.4" fill="rgba(230,201,132,.85)"/>
    <circle cx="272" cy="82" r="1.4" fill="rgba(230,201,132,.85)"/>
  </g>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="30" cy="30" r=".6" opacity=".7"/>
    <circle cx="285" cy="30" r=".7" opacity=".8"/>
    <circle cx="25" cy="200" r=".5" opacity=".6"/>
    <circle cx="295" cy="200" r=".5" opacity=".6"/>
    <circle cx="60" cy="50" r=".4" opacity=".5"/>
    <circle cx="100" cy="190" r=".4" opacity=".5"/>
    <circle cx="240" cy="195" r=".6" opacity=".75"/>
    <circle cx="220" cy="25" r=".4" opacity=".5"/>
  </g>
</svg>
